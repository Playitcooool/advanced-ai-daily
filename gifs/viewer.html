<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Viewer — Advanced AI Daily</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 20px; }
  .viewer { max-width: 860px; width: 100%; }
  .canvas-wrap { position: relative; background: #161b22; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
  canvas { display: block; width: 100%; height: auto; }
  .controls { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; font-size: 0.85rem; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #30363d; }
  button.active { background: #388bfd22; border-color: #388bfd; color: #58a6ff; }
  .slider-wrap { flex: 1; min-width: 120px; display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; accent-color: #58a6ff; }
  .frame-label { color: #8b949e; font-size: 0.8rem; white-space: nowrap; }
  .annotations { margin-top: 16px; background: #161b22; border-radius: 8px; border: 1px solid #30363d; padding: 16px; }
  .annotations h3 { font-size: 0.9rem; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .ann-list { display: flex; flex-direction: column; gap: 8px; }
  .ann { display: none; padding: 8px 12px; background: #21262d; border-radius: 6px; font-size: 0.88rem; line-height: 1.5; }
  .ann.active { display: block; }
  .ann .ann-title { color: #58a6ff; font-weight: 600; margin-bottom: 4px; }
  .ann .ann-body { color: #c9d1d9; }
  .speed-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #8b949e; }
  select { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 4px 8px; font-size: 0.82rem; }
  .help { margin-top: 16px; color: #484f58; font-size: 0.78rem; text-align: center; }
</style>
</head>
<body>
<h1 id="title">GIF Viewer</h1>
<div class="subtitle" id="subtitle">Frame-by-frame navigation for tutorial animations</div>

<div class="viewer">
  <div class="canvas-wrap">
    <canvas id="canvas" width="800" height="500"></canvas>
  </div>

  <div class="controls">
    <button id="btn-play" onclick="togglePlay()">Play</button>
    <button onclick="step(-1)">&#8592; Prev</button>
    <button onclick="step(1)">Next &#8594;</button>
    <div class="slider-wrap">
      <input type="range" id="slider" min="0" max="0" value="0" oninput="goToFrame(this.value)">
      <span class="frame-label" id="frameLabel">0 / 0</span>
    </div>
    <div class="speed-wrap">
      <label for="speed">Speed</label>
      <select id="speed" onchange="setSpeed(this.value)">
        <option value="0.25">0.25×</option>
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>

  <div class="annotations">
    <h3>Frame Annotations</h3>
    <div class="ann-list" id="annList"></div>
  </div>
</div>

<div class="help">Space = Play/Pause &nbsp;·&nbsp; Arrow keys = Step &nbsp;·&nbsp; Drag slider = Scrub</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('slider');
const frameLabel = document.getElementById('frameLabel');
const annList = document.getElementById('annList');

let frames = [];
let current = 0;
let playing = false;
let timer = null;
let speed = 1;
const DELAY_MS = 110;

function load(url) {
  document.getElementById('title').textContent = url.split('/').pop().replace('.gif', '').replace(/-/g, ' ');
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    extractFrames(img);
  };
  img.src = url;
}

function extractFrames(img) {
  const tmp = document.createElement('canvas');
  tmp.width = img.width;
  tmp.height = img.height;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(img, 0, 0);
  frames = [];
  // Use imageio or just parse via canvas — here we just use the full GIF
  // For proper frame extraction we'd need gif.js or imageio
  // For now, treat the image as a single-frame display with slider showing progress
  frames.push(img);
  slider.max = 0;
  drawFrame(0);
}

function drawFrame(idx) {
  if (!frames[idx]) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(frames[idx], 0, 0);
  current = idx;
  slider.value = idx;
  frameLabel.textContent = `${idx + 1} / ${Math.max(1, frames.length)}`;
  showAnnotation(idx);
}

function goToFrame(idx) {
  drawFrame(parseInt(idx));
}

function step(dir) {
  const next = Math.max(0, Math.min(frames.length - 1, current + dir));
  goToFrame(next);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? 'Pause' : 'Play';
  document.getElementById('btn-play').classList.toggle('active', playing);
  if (playing) autoplay();
  else clearTimeout(timer);
}

function autoplay() {
  if (!playing) return;
  const next = (current + 1) % Math.max(1, frames.length);
  goToFrame(next);
  timer = setTimeout(autoplay, DELAY_MS / speed);
}

function setSpeed(v) { speed = parseFloat(v); }

function showAnnotation(idx) {
  const anns = annList.querySelectorAll('.ann');
  anns.forEach((a, i) => a.classList.toggle('active', i === idx));
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') step(-1);
  if (e.code === 'ArrowRight') step(1);
});

// Load from URL param ?gif=
const params = new URLSearchParams(location.search);
if (params.has('gif')) load(params.get('gif'));
</script>
</body>
</html>
