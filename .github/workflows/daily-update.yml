name: Daily Tutorial Update

on:
  schedule:
    - cron: "0 0 * * *"   # UTC midnight every day
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Fetch latest arXiv papers
        id: arxiv
        run: |
          python scripts/fetch_daily_topics.py
      
      - name: Generate tutorial content
        run: |
          python scripts/generate_tutorial.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[auto] Daily tutorial update - $(date +'%Y-%m-%d')"
            git push
          fi
